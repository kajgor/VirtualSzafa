name: Backend CI

on:
  push:
    branches: [ main, tech/prod-bootstrap ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build placeholder
        run: echo "Configure Gradle build next"
